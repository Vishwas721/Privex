services:
  neo4j:
    image: neo4j:latest
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-password}
    volumes:
      - neo4j_data:/data
    networks:
      - privex_network

  privex-mcp:
    build:
      context: ./privex-mcp
    ports:
      - "3000:3000"
    env_file: .env
    networks:
      - privex_network

  privex-core-cpu:
    build:
      context: ./privex-core
    profiles:
      - cpu-fallback
    ports:
      - "8000:8000"
    env_file: .env
    networks:
      - privex_network
    depends_on:
      - neo4j

  privex-core-gpu:
    build:
      context: ./privex-core
    profiles:
      - gpu-enabled
    ports:
      - "8000:8000"
    env_file: .env
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]
    networks:
      - privex_network
    depends_on:
      - neo4j

networks:
  privex_network:
    name: privex_network

volumes:
  neo4j_data:
